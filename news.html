<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>News • Ethiopia Nuclear Energy Commission</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>

/* PAGE BACKGROUND */

body{
background:#0a0f1c;
font-family:Roboto;
margin:0;
color:white;
}

/* CENTERED FEED */

#news-container{
max-width:750px;
margin:40px auto;
padding:20px;
}

/* NEWS CARD */

.news-card{
background:#121c2f;
border-radius:12px;
padding:25px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(0,225,255,0.15);
transition:0.3s;
}

.news-card:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(0,225,255,0.3);
}

/* TITLE */

.news-title{
font-size:24px;
color:#00e1ff;
margin-bottom:15px;
}

/* MEDIA */

.news-media img,
.news-media video{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* PDF LINK */

.news-media a{
display:inline-block;
margin-top:10px;
color:#00e1ff;
}

/* CONTENT */

.news-content{
margin-top:15px;
line-height:1.7;
font-size:16px;
opacity:0.9;
}

/* NAVBAR */

.navbar{
background:#111a2b;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00e1ff;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
}

.logo{
color:#00e1ff;
font-family:Orbitron;
}

footer{
text-align:center;
padding:20px;
opacity:0.6;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">☢ Ethiopia Nuclear Energy Commission</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="co2-model.html">CO₂ Model</a>
<a href="experts.html">Experts</a>
<a href="news.html">News</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<div id="news-container"></div>

<script>

async function loadNews(){

const res = await fetch("http://localhost:5000/news");
const news = await res.json();

const container = document.getElementById("news-container");

news.forEach(n=>{

let mediaHTML = "";
let images = "";
let videos = "";
let docs = "";

if(n.files){

n.files.forEach(file=>{

if(file.endsWith(".mp4")){

videos += `<video controls src="http://localhost:5000/uploads/${file}"></video>`;

}

else if(file.endsWith(".pdf")){

docs += `<a href="http://localhost:5000/uploads/${file}" target="_blank">📄 View Document</a>`;

}

else{

images += `<img onclick="openLightbox(this.src)" src="http://localhost:5000/uploads/${file}">`;
}

});

mediaHTML = `
<div class="news-media">
<div class="image-grid">${images}</div>
${videos}
${docs}
</div>
`;

}
container.innerHTML += `

<div class="news-card">

<div class="news-title">${n.title}</div>

<div class="news-media">
${mediaHTML}
</div>

<div class="news-content">
${n.content.replace(/\n/g,"<br><br>")}
</div>

</div>

`;

});

}

loadNews();
function openLightbox(src){

const lightbox = document.getElementById("lightbox");
const img = document.getElementById("lightbox-img");

img.src = src;
lightbox.style.display = "flex";

}

function closeLightbox(){

document.getElementById("lightbox").style.display = "none";

}
</script>
<!-- IMAGE LIGHTBOX -->

<div id="lightbox" class="lightbox">

<span class="lightbox-close" onclick="closeLightbox()">×</span>

<img id="lightbox-img">

</div>
<footer>
<p>©2026 Ethiopian Nuclear Energy Commission</p>
</footer>

</body>
</html>
