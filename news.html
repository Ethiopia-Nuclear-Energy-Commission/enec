<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News • Ethiopia Nuclear Energy Commission</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>
/* PAGE BACKGROUND */
body {
  background: #0a0f1c;
  font-family: Roboto;
  margin: 0;
  color: white;
}

/* CENTERED FEED */
#news-container {
  max-width: 750px;
  margin: 40px auto;
  padding: 20px;
  min-height: 60vh; /* prevents jumpy layout */
  position: relative;
}

/* LOADING SPINNER */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}
.spinner {
  width: 60px;
  height: 60px;
  border: 6px solid #00e1ff33;
  border-top: 6px solid #00e1ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 15px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
#loading-text {
  font-size: 18px;
  color: #00e1ff;
  opacity: 0.9;
}

/* NEWS CARD */
.news-card {
  background: #121c2f;
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 30px;
  box-shadow: 0 0 20px rgba(0,225,255,0.15);
  transition: 0.3s;
}
.news-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 30px rgba(0,225,255,0.3);
}

/* TITLE */
.news-title {
  font-size: 24px;
  color: #00e1ff;
  margin-bottom: 15px;
}

/* MEDIA */
.news-media img,
.news-media video {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

/* PDF LINK */
.news-media a {
  display: inline-block;
  margin-top: 10px;
  color: #00e1ff;
}

/* CONTENT */
.news-content {
  margin-top: 15px;
  line-height: 1.7;
  font-size: 16px;
  opacity: 0.9;
}

/* REFRESH NOTICE */
#refresh-notice {
  text-align: center;
  color: #00e1ff88;
  font-size: 14px;
  margin: 20px 0;
  display: none;
}

/* NAVBAR */
.navbar {
  background: #111a2b;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #00e1ff;
}
.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
}
.logo {
  color: #00e1ff;
  font-family: Orbitron;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}
#lightbox-img {
  max-width: 90%;
  max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,225,255,0.5);
}
.lightbox-close {
  position: absolute;
  top: 30px;
  right: 40px;
  color: #00e1ff;
  font-size: 50px;
  cursor: pointer;
  z-index: 10000;
}

footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header class="navbar">
  <div class="logo">☢ Ethiopia Nuclear Energy Commission</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="co2-model.html">CO₂ Model</a>
    <a href="experts.html">Experts</a>
    <a href="news.html">News</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div id="news-container">
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading Nuclear Energy News...</div>
  </div>
  <div id="refresh-notice">Showing cached news • Loading fresh updates...</div>
</div>

<script>
const API_BASE = "https://enec.onrender.com";
const CACHE_KEY = "enec_news_cache";
const CACHE_TTL = 30 * 60 * 1000; // 30 minutes

function showLoading(show) {
  document.getElementById("loading").style.display = show ? "block" : "none";
}

function displayNews(newsItems, isFromCache = false) {
  const container = document.getElementById("news-container");
  // Keep loading/refesh elements, append cards after them
  let cardsHTML = "";

  if (newsItems.length === 0) {
    cardsHTML = "<p style='text-align:center; opacity:0.7;'>No news available yet.</p>";
  } else {
    newsItems.forEach(n => {
      let mediaHTML = "";
      let images = "";
      let videos = "";
      let docs = "";

      if (n.files) {
        n.files.forEach(file => {
          const src = file.startsWith("data:") ? file : `${API_BASE}/uploads/${file}`;

          if (file.endsWith(".mp4") || file.startsWith("data:video/")) {
            videos += `<video controls src="${src}"></video>`;
          } else if (file.endsWith(".pdf") || file.startsWith("data:application/pdf")) {
            docs += `<a href="${src}" target="_blank">📄 View Document</a>`;
          } else {
            images += `<img onclick="openLightbox(this.src)" src="${src}" alt="News image">`;
          }
        });
        mediaHTML = `
          <div class="news-media">
            <div class="image-grid">${images}</div>
            ${videos}
            ${docs}
          </div>
        `;
      }

      cardsHTML += `
        <div class="news-card">
          <div class="news-title">${n.title}</div>
          ${mediaHTML}
          <div class="news-content">
            ${n.content.replace(/\n/g, "<br><br>")}
          </div>
        </div>
      `;
    });
  }

  // Replace only the cards part (after loading/notice)
  const existingCards = container.querySelectorAll(".news-card");
  existingCards.forEach(card => card.remove());

  container.insertAdjacentHTML("beforeend", cardsHTML);

  if (isFromCache) {
    document.getElementById("refresh-notice").style.display = "block";
  }
}

async function fetchAndCacheNews() {
  try {
    const res = await fetch(`${API_BASE}/news`, { 
      cache: 'no-store',
      signal: AbortSignal.timeout(45000) // 45s timeout - better than hanging forever
    });

    if (!res.ok) throw new Error("Server responded with error");

    const news = await res.json();

    // Cache with timestamp
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      data: news,
      timestamp: Date.now()
    }));

    displayNews(news, false);
    document.getElementById("refresh-notice").style.display = "none";

  } catch (err) {
    console.error("Fetch failed:", err);
    // If we have cache, keep showing it - don't show error
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      // Already showing cache → just log
    } else {
      document.getElementById("news-container").innerHTML += 
        "<p style='text-align:center;color:#ff4d4d;margin-top:40px;'>Failed to load news. Please try again later.</p>";
    }
  } finally {
    showLoading(false);
  }
}

function loadFromCache() {
  const cached = localStorage.getItem(CACHE_KEY);
  if (!cached) return false;

  const { data, timestamp } = JSON.parse(cached);
  const age = Date.now() - timestamp;

  displayNews(data, true);

  // If cache is fresh (< 30 min), no need to show "loading fresh"
  if (age < CACHE_TTL) {
    document.getElementById("refresh-notice").style.display = "none";
  }

  return true;
}

// ────────────────────────────────────────────────
// MAIN FLOW
// ────────────────────────────────────────────────
showLoading(true);

const hadCache = loadFromCache();

// Always try to refresh (background)
fetchAndCacheNews();

// If no cache at all, keep spinner until fetch finishes or fails
if (!hadCache) {
  // spinner already shown
} else {
  showLoading(false); // hide immediately if we showed cache
}

function openLightbox(src) {
  const lightbox = document.getElementById("lightbox");
  const img = document.getElementById("lightbox-img");
  img.src = src;
  lightbox.style.display = "flex";
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

<!-- IMAGE LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img" onclick="event.stopPropagation()">
</div>

<footer>
  <p>©2026 Ethiopian Nuclear Energy Commission</p>
</footer>

</body>
</html>
