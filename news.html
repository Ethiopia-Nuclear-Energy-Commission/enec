<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News • Ethiopia Nuclear Energy Commission</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>
/* PAGE BACKGROUND */
body{
background:#0a0f1c;
font-family:Roboto;
margin:0;
color:white;
}

/* CENTERED FEED */
#news-container{
max-width:750px;
margin:40px auto;
padding:20px;
}

/* NEWS CARD */
.news-card{
background:#121c2f;
border-radius:12px;
padding:25px;
margin-bottom:30px;
box-shadow:0 0 20px rgba(0,225,255,0.15);
transition:0.3s;
}
.news-card:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(0,225,255,0.3);
}

/* TITLE */
.news-title{
font-size:24px;
color:#00e1ff;
margin-bottom:15px;
}

/* MEDIA */
.news-media img,
.news-media video{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* PDF LINK */
.news-media a{
display:inline-block;
margin-top:10px;
color:#00e1ff;
}

/* CONTENT */
.news-content{
margin-top:15px;
line-height:1.7;
font-size:16px;
opacity:0.9;
}

/* NAVBAR */
.navbar{
background:#111a2b;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00e1ff;
}
.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
}
.logo{
color:#00e1ff;
font-family:Orbitron;
}

/* LIGHTBOX (ADDED - was missing!) */
.lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
}
#lightbox-img {
  max-width: 90%;
  max-height: 90vh;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,225,255,0.5);
}
.lightbox-close {
  position: absolute;
  top: 30px;
  right: 40px;
  color: #00e1ff;
  font-size: 50px;
  cursor: pointer;
  z-index: 10000;
}

footer{
text-align:center;
padding:20px;
opacity:0.6;
}
</style>
</head>

<body>

<header class="navbar">
<div class="logo">☢ Ethiopia Nuclear Energy Commission</div>
<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="co2-model.html">CO₂ Model</a>
<a href="experts.html">Experts</a>
<a href="news.html">News</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div id="news-container"></div>

<script>
const API_BASE = "https://enec.onrender.com";

async function loadNews(){
try{
const res = await fetch(`${API_BASE}/news`);
const news = await res.json();

const container = document.getElementById("news-container");
container.innerHTML = "";

news.forEach(n=>{

let mediaHTML = "";
let images = "";
let videos = "";
let docs = "";

if(n.files){
n.files.forEach(file => {
  // NEW: works with BOTH old filenames AND new base64 data URLs
  const src = file.startsWith("data:") ? file : `${API_BASE}/uploads/${file}`;

  if(file.endsWith(".mp4") || file.startsWith("data:video/")){
    videos += `<video controls src="${src}"></video>`;
  }
  else if(file.endsWith(".pdf") || file.startsWith("data:application/pdf")){
    docs += `<a href="${src}" target="_blank">📄 View Document</a>`;
  }
  else{
    images += `<img onclick="openLightbox(this.src)" src="${src}">`;
  }
});
mediaHTML = `
<div class="news-media">
<div class="image-grid">${images}</div>
${videos}
${docs}
</div>
`;
}

container.innerHTML += `
<div class="news-card">
<div class="news-title">${n.title}</div>
${mediaHTML}
<div class="news-content">
${n.content.replace(/\n/g,"<br><br>")}
</div>
</div>
`;
});

}catch(err){
document.getElementById("news-container").innerHTML =
"<p style='text-align:center;color:red;'>Failed to load news</p>";
console.error(err);
}
}

loadNews();

function openLightbox(src){
const lightbox = document.getElementById("lightbox");
const img = document.getElementById("lightbox-img");
img.src = src;
lightbox.style.display = "flex";
}

function closeLightbox(){
document.getElementById("lightbox").style.display = "none";
}
</script>

<!-- IMAGE LIGHTBOX -->
<div id="lightbox" class="lightbox">
<span class="lightbox-close" onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>

<footer>
<p>©2026 Ethiopian Nuclear Energy Commission</p>
</footer>

</body>
</html>
